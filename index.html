<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保險文案生成器 · 保險好鄰居</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

  :root {
    --bg: #EDEBE2;
    --shadow: #DBDCD2;
    --accent: #E8C67B;
    --navy: #1C2B4A;
    --navy-light: #2E4272;
    --text: #2A2A2A;
    --text-muted: #6B6B6B;
    --white: #FFFFFF;
    --card-bg: #F7F5EE;
    --success: #3A7D5C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Montserrat', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--navy);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .logo-tag {
    background: var(--accent);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  header h1 { color: var(--white); font-size: 15px; font-weight: 600; }

  main { max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; }

  .hero { margin-bottom: 28px; }
  .hero-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
  .hero h2 { font-size: 24px; font-weight: 700; color: var(--navy); line-height: 1.3; margin-bottom: 6px; }
  .hero p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  .card { background: var(--card-bg); border: 1px solid var(--shadow); border-radius: 12px; padding: 24px; margin-bottom: 16px; }

  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--navy); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--shadow); }

  .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  @media (max-width: 480px) { .template-grid { grid-template-columns: 1fr; } }

  .template-btn {
    background: var(--white); border: 1.5px solid var(--shadow); border-radius: 8px;
    padding: 11px 13px; cursor: pointer; text-align: left; transition: all 0.15s;
  }
  .template-btn:hover { border-color: var(--navy-light); }
  .template-btn.active { border-color: var(--navy); background: var(--navy); color: var(--white); }
  .template-btn .t-emoji { font-size: 17px; display: block; margin-bottom: 4px; }
  .template-btn .t-name { font-size: 13px; font-weight: 600; display: block; margin-bottom: 2px; }
  .template-btn .t-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .template-btn.active .t-desc { color: rgba(255,255,255,0.6); }

  .field-group { margin-bottom: 16px; }
  .field-group:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  input[type="text"], textarea {
    width: 100%; background: var(--white); border: 1.5px solid var(--shadow);
    border-radius: 8px; padding: 10px 13px; font-size: 14px; font-family: inherit;
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--navy); }
  textarea { resize: vertical; min-height: 68px; }

  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    background: var(--white); border: 1.5px solid var(--shadow); border-radius: 20px;
    padding: 6px 13px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; color: var(--text-muted); font-family: inherit;
  }
  .chip:hover { border-color: var(--navy-light); color: var(--navy); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: var(--navy); }

  .generate-btn {
    width: 100%; background: var(--navy); color: var(--white); border: none;
    border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .generate-btn:hover { background: var(--navy-light); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    width: 17px; height: 17px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: var(--white); border: 1.5px solid var(--accent);
    border-radius: 12px; padding: 24px; margin-top: 16px; display: none;
  }
  .result-card.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 10px; flex-wrap: wrap; }
  .result-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }

  .result-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }

  .result-actions { display: flex; gap: 8px; }
  .action-btn {
    background: transparent; border: 1.5px solid var(--shadow); border-radius: 6px;
    padding: 5px 12px; font-size: 12px; font-weight: 600; font-family: inherit;
    cursor: pointer; color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--navy); color: var(--navy); }
  .action-btn.copied { border-color: var(--success); color: var(--success); }

  .result-text {
    font-size: 14px; line-height: 1.9; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }

  .error-msg {
    background: #FFF0F0; border: 1px solid #FFCCCC; border-radius: 8px;
    padding: 12px 16px; font-size: 13px; color: #C0392B; margin-top: 14px; display: none;
  }
  .error-msg.show { display: block; }

  .stream-cursor {
    display: inline-block; width: 2px; height: 1em; background: var(--navy);
    animation: blink 0.8s step-end infinite; vertical-align: text-bottom; margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <span class="logo-tag">保險好鄰居</span>
  <h1>保險文案生成器</h1>
</header>

<main>
  <div class="hero">
    <div class="hero-label">AI 文案工具</div>
    <h2>輸入關鍵字，<br>一秒生成行銷文案</h2>
    <p>選擇故事框架，填入產品與客群，AI 幫你寫出有溫度的保險文案。</p>
  </div>

  <div class="card">
    <div class="section-title">選擇故事框架</div>
    <div class="template-grid">
      <button class="template-btn active" data-id="three_pigs" onclick="selectTemplate(this)">
        <span class="t-emoji">🐷</span>
        <span class="t-name">三隻小豬心法</span>
        <span class="t-desc">保障層次的重要性</span>
      </button>
      <button class="template-btn" data-id="cinderella" onclick="selectTemplate(this)">
        <span class="t-emoji">👠</span>
        <span class="t-name">灰姑娘心法</span>
        <span class="t-desc">命運逆轉，保險改變人生</span>
      </button>
      <button class="template-btn" data-id="ant_grasshopper" onclick="selectTemplate(this)">
        <span class="t-emoji">🐜</span>
        <span class="t-name">螞蟻與蚱蜢</span>
        <span class="t-desc">退休規劃最佳框架</span>
      </button>
      <button class="template-btn" data-id="ugly_duckling" onclick="selectTemplate(this)">
        <span class="t-emoji">🦢</span>
        <span class="t-name">醜小鴨心法</span>
        <span class="t-desc">蛻變成長，適合增員主題</span>
      </button>
      <button class="template-btn" data-id="tortoise_hare" onclick="selectTemplate(this)">
        <span class="t-emoji">🐢</span>
        <span class="t-name">龜兔賽跑</span>
        <span class="t-desc">穩健累積，長期致勝</span>
      </button>
      <button class="template-btn" data-id="umbrella" onclick="selectTemplate(this)">
        <span class="t-emoji">☂️</span>
        <span class="t-name">雨傘心法</span>
        <span class="t-desc">晴天買傘，未雨綢繆</span>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">填入內容</div>

    <div class="field-group">
      <label>賣什麼？（產品 / 服務 / 主題）</label>
      <input type="text" id="product" placeholder="例：投資型保單、長照險、定期壽險…">
    </div>

    <div class="field-group">
      <label>賣給誰？（目標客群）</label>
      <input type="text" id="audience" placeholder="例：50歲屆退人士、新婚夫妻、小資上班族…">
    </div>

    <div class="field-group">
      <label>最想強調什麼？（痛點 / 賣點 / 情境）<span style="font-weight:400;color:var(--text-muted)"> 選填</span></label>
      <textarea id="emphasis" placeholder="例：退休後現金流不夠、醫療費用讓家人措手不及…"></textarea>
    </div>

    <div class="field-group">
      <label>文案風格</label>
      <div class="chip-row">
        <button class="chip active" data-style="溫暖故事型" onclick="selectChip(this,'style')">🌿 溫暖故事</button>
        <button class="chip" data-style="數據說理型" onclick="selectChip(this,'style')">📊 數據說理</button>
        <button class="chip" data-style="問句鉤子型" onclick="selectChip(this,'style')">❓ 問句鉤子</button>
        <button class="chip" data-style="行動呼籲型" onclick="selectChip(this,'style')">🎯 行動呼籲</button>
      </div>
    </div>

    <div class="field-group">
      <label>發布平台</label>
      <div class="chip-row">
        <button class="chip active" data-platform="FB / IG 貼文" onclick="selectChip(this,'platform')">📘 FB / IG</button>
        <button class="chip" data-platform="LINE 訊息" onclick="selectChip(this,'platform')">💬 LINE</button>
        <button class="chip" data-platform="早會口頭分享" onclick="selectChip(this,'platform')">🎤 早會</button>
        <button class="chip" data-platform="短影音旁白腳本" onclick="selectChip(this,'platform')">🎬 短影音</button>
      </div>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generateCopy()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">✦ 生成文案</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="result-label">✦ 生成結果</span>
      <div class="result-actions">
        <button class="action-btn" id="copyBtn" onclick="copyCopy()">複製文案</button>
      </div>
    </div>
    <div class="result-meta" id="resultMeta"></div>
    <div class="result-text" id="resultText"></div>
  </div>
</main>

<footer>保險好鄰居 @urbxneighbor · 由 Gemini AI 驅動</footer>

<script>
const TEMPLATES = {
  three_pigs: {
    system: `你是保險好鄰居（@urbxneighbor）的文案助理，擅長用溫暖、簡單易懂的方式解釋保險。文案風格：不說教、有生活感、讓人讀完想轉發。請用「三隻小豬」框架：第一隻（稻草屋）= 沒保障；第二隻（木屋）= 基本保障不足；第三隻（磚屋）= 完整規劃。用這個比喻帶出產品。`
  },
  cinderella: {
    system: `你是保險好鄰居（@urbxneighbor）的文案助理，擅長用溫暖、簡單易懂的方式解釋保險。文案風格：不說教、有生活感、讓人讀完想轉發。請用「灰姑娘」框架：困境（風險）→ 仙女教母（保險規劃）→ 舞會（安心生活）→ 美好未來。`
  },
  ant_grasshopper: {
    system: `你是保險好鄰居（@urbxneighbor）的文案助理，擅長用溫暖、簡單易懂的方式解釋保險。文案風格：不說教、有生活感、讓人讀完想轉發。請用「螞蟻與蚱蜢」框架對比：蚱蜢（只顧當下）vs 螞蟻（提早布局）。不要說教，讓讀者自然認同螞蟻的選擇。`
  },
  ugly_duckling: {
    system: `你是保險好鄰居（@urbxneighbor）的文案助理，擅長用溫暖、簡單易懂的方式解釋保險。文案風格：不說教、有生活感、讓人讀完想轉發。請用「醜小鴨」框架：困境誤解 → 認識保險的過程 → 蛻變自信。適合增員或課程推廣。`
  },
  tortoise_hare: {
    system: `你是保險好鄰居（@urbxneighbor）的文案助理，擅長用溫暖、簡單易懂的方式解釋保險。文案風格：不說教、有生活感、讓人讀完想轉發。請用「龜兔賽跑」框架：兔子（短視急功、忽視規劃）vs 烏龜（穩健累積、長期布局）。帶出定期定額或長期保障規劃的重要性，讓讀者認同慢而穩的選擇。`
  },
  umbrella: {
    system: `你是保險好鄰居（@urbxneighbor）的文案助理，擅長用溫暖、簡單易懂的方式解釋保險。文案風格：不說教、有生活感、讓人讀完想轉發。請用「雨傘」比喻：晴天（現在健康）是買傘的最佳時機，等下雨（生病/事故）再想買傘已來不及。強調提早規劃的智慧，語氣溫和，不製造恐懼。`
  }
};

let selectedTemplate = 'three_pigs';
let selectedStyle = '溫暖故事型';
let selectedPlatform = 'FB / IG 貼文';

function selectTemplate(btn) {
  document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTemplate = btn.dataset.id;
}

function selectChip(btn, type) {
  btn.closest('.chip-row').querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'style') selectedStyle = btn.dataset.style;
  else selectedPlatform = btn.dataset.platform;
}

async function generateCopy() {
  const product = document.getElementById('product').value.trim();
  const audience = document.getElementById('audience').value.trim();
  const emphasis = document.getElementById('emphasis').value.trim();

  if (!product || !audience) {
    showError('請至少填入「賣什麼」和「賣給誰」兩個欄位 😊');
    return;
  }

  const btn = document.getElementById('generateBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const resultCard = document.getElementById('resultCard');
  const resultText = document.getElementById('resultText');
  const resultMeta = document.getElementById('resultMeta');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = '生成中…';
  document.getElementById('errorMsg').classList.remove('show');
  resultCard.classList.remove('show');
  resultText.textContent = '';
  resultMeta.textContent = '';

  const platformHint = {
    'FB / IG 貼文': '適合社群貼文，加入適當段落與換行，可加 hashtag',
    'LINE 訊息': '簡短有力，適合私訊轉發，段落清楚，不超過3段',
    '早會口頭分享': '適合口頭報告，加入停頓問句，有互動感',
    '短影音旁白腳本': '用旁白腳本格式，每句話獨立成行，有畫面感',
  }[selectedPlatform] || '';

  const userPrompt = `請幫我寫一段保險行銷文案，使用上述故事框架。

【產品/主題】${product}
【目標客群】${audience}
【強調重點】${emphasis || '未特別指定'}
【文案風格】${selectedStyle}
【發布平台】${selectedPlatform}

格式要求：
- 長度約 200–300 字
- 繁體中文，台灣口語
- 自然像朋友說話，不說教
- 結尾加一句溫和的行動呼籲
- ${platformHint}`;

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: TEMPLATES[selectedTemplate].system,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({ error: { message: `HTTP ${response.status}` } }));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    resultCard.classList.add('show');
    resultText.innerHTML = '<span class="stream-cursor"></span>';

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          const chunk = parsed.choices?.[0]?.delta?.content;
          if (chunk) {
            fullText += chunk;
            resultText.textContent = fullText;
            const cursor = document.createElement('span');
            cursor.className = 'stream-cursor';
            resultText.appendChild(cursor);
          }
        } catch {}
      }
    }

    resultText.textContent = fullText;
    const charCount = fullText.replace(/\s/g, '').length;
    resultMeta.textContent = `${charCount} 字 · ${selectedPlatform}`;
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    showError('生成失敗：' + err.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = '✦ 再生成一次';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

async function copyCopy() {
  const text = document.getElementById('resultText').textContent;
  const btn = document.getElementById('copyBtn');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '已複製 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製文案'; btn.classList.remove('copied'); }, 2000);
  } catch {
    btn.textContent = '請手動複製';
  }
}
</script>
</body>
</html>
