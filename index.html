<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保險提示詞生成器 · 保險好鄰居</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

  :root {
    --bg: #EDEBE2;
    --shadow: #DBDCD2;
    --accent: #E8C67B;
    --navy: #1C2B4A;
    --navy-light: #2E4272;
    --text: #2A2A2A;
    --text-muted: #6B6B6B;
    --white: #FFFFFF;
    --card-bg: #F7F5EE;
    --success: #3A7D5C;
    --gpt-color: #10A37F;
    --gemini-color: #4285F4;
    --claude-color: #D97706;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Montserrat', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--navy);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .logo-tag {
    background: var(--accent);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  header h1 { color: var(--white); font-size: 15px; font-weight: 600; }

  main { max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; }

  .hero { margin-bottom: 28px; }
  .hero-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
  .hero h2 { font-size: 24px; font-weight: 700; color: var(--navy); line-height: 1.3; margin-bottom: 6px; }
  .hero p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  .card { background: var(--card-bg); border: 1px solid var(--shadow); border-radius: 12px; padding: 24px; margin-bottom: 16px; }

  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--navy); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--shadow); }

  /* AI Platform Cards */
  .platform-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 480px) { .platform-grid { grid-template-columns: 1fr; } }

  .platform-btn {
    background: var(--white);
    border: 2px solid var(--shadow);
    border-radius: 12px;
    padding: 16px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .platform-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    opacity: 0;
    transition: opacity 0.18s;
  }
  .platform-btn[data-platform="chatgpt"]::before { background: var(--gpt-color); }
  .platform-btn[data-platform="gemini"]::before { background: var(--gemini-color); }
  .platform-btn[data-platform="claude"]::before { background: var(--claude-color); }

  .platform-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .platform-btn.active { border-color: transparent; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .platform-btn.active::before { opacity: 1; }
  .platform-btn[data-platform="chatgpt"].active { border-color: var(--gpt-color); }
  .platform-btn[data-platform="gemini"].active { border-color: var(--gemini-color); }
  .platform-btn[data-platform="claude"].active { border-color: var(--claude-color); }

  .p-icon { font-size: 28px; display: block; margin-bottom: 8px; }
  .p-name { font-size: 13px; font-weight: 700; display: block; margin-bottom: 3px; color: var(--navy); }
  .p-desc { font-size: 10px; color: var(--text-muted); line-height: 1.4; }

  /* Fields */
  .field-group { margin-bottom: 16px; }
  .field-group:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .label-optional { font-weight: 400; color: var(--text-muted); }
  input[type="text"], textarea {
    width: 100%; background: var(--white); border: 1.5px solid var(--shadow);
    border-radius: 8px; padding: 10px 13px; font-size: 14px; font-family: inherit;
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--navy); }
  textarea { resize: vertical; min-height: 80px; }

  /* Generate Button */
  .generate-btn {
    width: 100%; background: var(--navy); color: var(--white); border: none;
    border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .generate-btn:hover { background: var(--navy-light); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    width: 17px; height: 17px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result-card {
    background: var(--white); border: 2px solid var(--accent);
    border-radius: 12px; padding: 24px; margin-top: 16px; display: none;
  }
  .result-card.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
  .result-label-wrap { display: flex; flex-direction: column; gap: 4px; }
  .result-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
  .result-hint { font-size: 11px; color: var(--text-muted); }

  .result-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .action-btn {
    background: transparent; border: 1.5px solid var(--shadow); border-radius: 6px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; font-family: inherit;
    cursor: pointer; color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--navy); color: var(--navy); }
  .action-btn.copied { border-color: var(--success); color: var(--success); }

  .result-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--shadow); }

  .result-text {
    font-size: 13.5px; line-height: 1.9; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
    font-family: 'Courier New', 'Consolas', monospace;
    background: #FAFAF7;
    border-radius: 8px;
    padding: 16px;
  }

  .error-msg {
    background: #FFF0F0; border: 1px solid #FFCCCC; border-radius: 8px;
    padding: 12px 16px; font-size: 13px; color: #C0392B; margin-top: 14px; display: none;
  }
  .error-msg.show { display: block; }

  .stream-cursor {
    display: inline-block; width: 8px; height: 1.2em; background: var(--navy);
    animation: blink 0.8s step-end infinite; vertical-align: text-bottom; margin-left: 2px;
    border-radius: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <span class="logo-tag">保險好鄰居</span>
  <h1>提示詞生成器</h1>
</header>

<main>
  <div class="hero">
    <div class="hero-label">AI Prompt 工具</div>
    <h2>一鍵生成專屬提示詞，<br>貼入 AI 立即產出文案</h2>
    <p>填入產品與客群，選擇你要使用的 AI 工具，系統自動生成最適合該平台的提示詞格式。</p>
  </div>

  <!-- Step 1: Fill Info -->
  <div class="card">
    <div class="section-title">填入內容</div>

    <div class="field-group">
      <label>賣什麼？（產品 / 服務 / 主題）</label>
      <input type="text" id="product" placeholder="例：長照險、投資型保單、定期壽險…">
    </div>

    <div class="field-group">
      <label>賣給誰？（目標客群）</label>
      <input type="text" id="audience" placeholder="例：50歲屆退族、新婚夫妻、小資上班族…">
    </div>

    <div class="field-group">
      <label>最想強調什麼？<span class="label-optional">選填</span></label>
      <textarea id="emphasis" placeholder="例：退休後現金流、醫療費用讓家人措手不及、年輕人覺得保險很貴…"></textarea>
    </div>
  </div>

  <!-- Step 2: Choose Platform -->
  <div class="card">
    <div class="section-title">選擇 AI 平台</div>
    <div class="platform-grid">
      <button class="platform-btn active" data-platform="chatgpt" onclick="selectPlatform(this)">
        <span class="p-icon">🤖</span>
        <span class="p-name">ChatGPT</span>
        <span class="p-desc">角色扮演 + 步驟指令格式</span>
      </button>
      <button class="platform-btn" data-platform="gemini" onclick="selectPlatform(this)">
        <span class="p-icon">✨</span>
        <span class="p-name">Gemini</span>
        <span class="p-desc">簡潔 XML 標籤格式</span>
      </button>
      <button class="platform-btn" data-platform="claude" onclick="selectPlatform(this)">
        <span class="p-icon">🟠</span>
        <span class="p-name">Claude</span>
        <span class="p-desc">完整 XML 巢狀結構格式</span>
      </button>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generatePrompt()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">✦ 生成提示詞</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-label-wrap">
        <span class="result-label">✦ 生成的提示詞</span>
        <span class="result-hint" id="resultHint"></span>
      </div>
      <div class="result-actions">
        <button class="action-btn" id="copyBtn" onclick="copyPrompt()">複製提示詞</button>
      </div>
    </div>
    <div class="result-meta" id="resultMeta"></div>
    <div class="result-text" id="resultText"></div>
  </div>
</main>

<footer>保險好鄰居 @urbxneighbor · 由 Groq AI 驅動</footer>

<script>
const PLATFORM_HINTS = {
  chatgpt: '複製後貼入 ChatGPT 對話框',
  gemini: '複製後貼入 Gemini 對話框',
  claude: '複製後貼入 Claude 對話框',
};

const PLATFORM_NAMES = {
  chatgpt: 'ChatGPT',
  gemini: 'Gemini',
  claude: 'Claude',
};

const SYSTEM_PROMPT = `你是一位專業的 AI 提示詞工程師，專門為保險行銷業務員設計提示詞。

根據使用者提供的產品、客群、重點，生成一份可直接複製貼入指定 AI 工具的提示詞。

【重要規則】
- 生成的提示詞必須全部使用繁體中文撰寫，不可出現英文句子
- 標籤名稱（如 XML tag）可以保留英文，但標籤內容與所有指令文字必須是繁體中文
- 語氣自然，符合台灣使用習慣

提示詞的最終目的：讓 AI 生成一段 200-300 字、吸引人的保險行銷文案，繁體中文、台灣用語、口語自然。

根據不同平台的特性產出對應格式：

【ChatGPT 格式】
- 開頭用「請你扮演...」定義角色（繁體中文）
- 用編號步驟說明任務
- 加入「請逐步思考後再輸出」提升品質
- 結尾明確說明輸出要求

【Gemini 格式】
- 語言簡潔直接，不贅述
- 使用 XML 標籤：<context>, <task>, <input>, <requirements>
- 每個標籤內容精簡，一行一點，全部繁體中文

【Claude 格式】
- 使用完整巢狀 XML 結構
- 標籤順序：<context> → <task> → <input> → <instructions> → <output_format>
- 標籤內容全部繁體中文，可加入更細緻的條件與規範

只輸出提示詞本身，不要加任何說明、解釋或前後文字。`;

let selectedPlatform = 'chatgpt';

function selectPlatform(btn) {
  document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedPlatform = btn.dataset.platform;
}

async function generatePrompt() {
  const product = document.getElementById('product').value.trim();
  const audience = document.getElementById('audience').value.trim();
  const emphasis = document.getElementById('emphasis').value.trim();

  if (!product || !audience) {
    showError('請填入「賣什麼」和「賣給誰」兩個欄位 😊');
    return;
  }

  const btn = document.getElementById('generateBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const resultCard = document.getElementById('resultCard');
  const resultText = document.getElementById('resultText');
  const resultMeta = document.getElementById('resultMeta');
  const resultHint = document.getElementById('resultHint');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = '生成中…';
  document.getElementById('errorMsg').classList.remove('show');
  resultCard.classList.remove('show');
  resultText.textContent = '';
  resultMeta.textContent = '';

  const userMsg = `請為以下保險業務情境，生成適合貼入【${PLATFORM_NAMES[selectedPlatform]}】的提示詞：

產品／主題：${product}
目標客群：${audience}
強調重點：${emphasis || '未特別指定，請根據產品和客群自行判斷'}
目標平台：${PLATFORM_NAMES[selectedPlatform]}

請直接輸出提示詞，不要加任何前言或解釋。`;

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
      throw new Error(err.error || `HTTP ${response.status}`);
    }

    const data = await response.json();
    if (data.error) throw new Error(data.error);

    const fullText = data.text || '';
    resultCard.classList.add('show');
    resultHint.textContent = PLATFORM_HINTS[selectedPlatform];
    resultMeta.textContent = `針對 ${PLATFORM_NAMES[selectedPlatform]} 優化 · 共 ${fullText.length} 字元`;

    // 打字機效果
    resultText.textContent = '';
    let i = 0;
    const type = () => {
      if (i < fullText.length) {
        resultText.textContent = fullText.slice(0, ++i);
        setTimeout(type, 8);
      } else {
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    };
    type();

  } catch (err) {
    showError('生成失敗：' + err.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = '✦ 再生成一次';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

async function copyPrompt() {
  const text = document.getElementById('resultText').textContent;
  const btn = document.getElementById('copyBtn');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '已複製 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製提示詞'; btn.classList.remove('copied'); }, 2000);
  } catch {
    btn.textContent = '請手動複製';
  }
}
</script>
</body>
</html>
